<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>NoteNest</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>
  <div id="toast-message"></div>
<div class="stars"></div>
  <!-- HEADER -->

  <header>
  <div class="brand-container">
    <svg class="blackhole-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="18" fill="black" stroke="#fbfff1" stroke-width="1.5"/>
      <path d="M10,62 C30,55 70,45 90,38 C70,45 30,55 10,62 Z" fill="#fbfff1"/>
      <path d="M15,60 Q50,40 85,40" fill="none" stroke="#fbfff1" stroke-width="3" stroke-linecap="round"/>
      <path d="M20,61 Q50,62 80,41" fill="none" stroke="#fbfff1" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <h2>NoteNest</h2>
    <svg xmlns="http://w3.org" width="24" height="24" viewBox="0 0 24 24" fill="white" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
  <polyline points="14 2 14 8 20 8"></polyline>
  <line x1="16" y1="13" x2="8" y2="13"></line>
  <line x1="16" y1="17" x2="8" y2="17"></line>
  <polyline points="10 9 9 9 8 9"></polyline>
</svg>

  </div>

    <!-- NAVIGATION BUTTONS -->

    <nav>

  <button class="nav-btn"
          onclick="showSection('dashboard-section', this)">
          Dashboard
  </button>

  <button class="nav-btn"
          onclick="showSection('manager-section', this)">
          Notes Manager
  </button>

  <button
      id="account-btn"
      class="nav-btn"
      onclick="showSection('account-section', this)">
      Account
  </button>

  <button
      id="login-btn"
      class="nav-btn"
      onclick="showSection('account-section', this)">
      Login
  </button>

  <button
      id="signup-btn"
      class="nav-btn"
      onclick="showSection('account-section', this)">
      Sign Up
  </button>

</nav>

<div class="header-actions">

  <span
      class="badge"
      id="dark-mode-btn"
      onclick="toggleDarkMode()">
      Dark Mode
  </span>

  <button
      id="logout-btn"
      class="btn-logout"
      onclick="logoutUser()">
      Logout
  </button>

</div>
</header>


  <div class="container">


    <!-- ACCOUNT SECTION -->

    <div id="account-section">

      <!-- LOGIN SECTION -->

      <div class="box1">

    <h2>Account</h2>

    <div class="auth-toggle">

        <button
            id="login-tab"
            class="auth-tab active"
            onclick="showLogin()">
            Login
        </button>

        <button
            id="signup-tab"
            class="auth-tab"
            onclick="showSignup()">
            Sign Up
        </button>

    </div>


    <!-- LOGIN FORM -->

    <div id="login-form">

        <input
            type="email"
            id="login-email"
            placeholder="Enter Email">

        <input
            type="password"
            id="login-password"
            placeholder="Enter Password">

        <button onclick="loginUser()">
            Login
        </button>

    </div>


    <!-- SIGNUP FORM -->

    <div
        id="signup-form"
        style="display:none;">

        <input
            type="text"
            id="signup-name"
            placeholder="Enter Your Name">

        <input
            type="email"
            id="signup-email"
            placeholder="Enter Email">

        <input
            type="password"
            id="signup-password"
            placeholder="Enter Password">

        <button onclick="signupUser()">
            Sign Up
        </button>

    </div>

</div>

      <!-- USER PROFILE -->

      <div class="box1">
        <!-- A clean, scalable SVG user icon -->
      <svg xmlns="http://w3.org" viewBox="0 0 24 24" width="48" height="48" fill="blue" class="user-icon">
  <!-- Head -->
  <circle cx="12" cy="8" r="4" />
  <!-- Body -->
  <path d="M12 14c-6.1 0-8 4-8 4v2h16v-2s-1.9-4-8-4z" />
      </svg>


        <h2>User Profile</h2>

        <p><strong>Name:</strong> <span id="profile-name">Guest User</span></p>

        <p><strong>Email:</strong> <span id="profile-email">Not Logged In</span></p>

        <p><strong>Member Since:</strong> <span id="member-since"></span></p>

      </div>


      <!-- PERSONALIZATION SETTINGS -->

      <div class="box1">

        <h4> Personalization Settings</h4>
        <!-- Personalization Icon (User profile with a settings gear) -->
          <svg xmlns="http://w3.org" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"></path>
          <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
          </svg>




        <label for="theme-color-select">Select Theme Color</label>

        <select id="theme-color-select"onchange="changeThemeColor()">

          <option>Yellow</option>

          <option>Blue</option>

          <option>Green</option>

          <option>Pink</option>

        </select>


        <label for="font-style-select">Select Font Style</label>

        <select id="font-style-select"onchange="changeFontStyle()">

          <option>Arial</option>

          <option>Poppins</option>

          <option>Courier New</option>

        </select>


        <label for="notes-view-select">Choose Notes View</label>

        <select id="notes-view-select"onchange="changeNotesView()">

          <option>Grid View</option>

          <option>List View</option>

        </select>

      </div>

    </div>



    <!-- NOTES MANAGER SECTION -->

    <div id="manager-section">

      <!-- CREATE NOTE -->

      <div class="box1">

        <h2>Create New Note</h2>

        <input type="text" id="note-title" placeholder="Enter Note Title">

        <textarea rows="5" id="note-text" placeholder="Write your note here..."></textarea>


        <label>Select Category</label>

        <select aria-label="Select Category">

          <option>Study</option>

          <option>Work</option>

          <option>Personal</option>

          <option>Ideas</option>

        </select>


        <label for="note-color">Select Note Color</label>
        <label for="note-tag">Select Note Type</label>

      <select id="note-tag"  name="note-type" >

       <option>Priority Task</option>

       <option>Favorite Project</option>

       <option>Reminder Enabled</option>

       <option>Upcoming Event</option>

       <option>Creative Idea</option>

       </select>

        <select id="note-color" name="Select Note Color">

          <option>Yellow</option>

          <option>Blue</option>

          <option>Green</option>

          <option>Pink</option>

        </select>

       <button onclick="addNote()">Save Note</button>

      </div>



      <!-- REMINDER SECTION -->

      <div class="box1">

        <h2>
          <div>
<svg xmlns="http://w3.org" viewBox="0 0 24 24" width="30" height="30" fill="#FFD846" stroke="red" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
  <path d="M13.73 21a2 2 0 0 1-3.46 0" />
</svg>



          </div> Set Reminder</h2>

       <input type="text" id="reminder-note-title" placeholder="Enter Note Title">

       <input type="date" id="reminder-date" title="Select reminder date">

       <input type="time" id="reminder-time" title="Select reminder time">

       <button onclick="setReminder()">Save Reminder</button>
      </div>

    </div>



    <!-- DASHBOARD SECTION -->

    <div id="dashboard-section">


      <!-- SEARCH NOTES -->

      <div class="box">
       
       <!-- Magnifying Glass Icon -->
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
        <path fill="none" d="M0 0h24v24H0z"/>
        <path d="M18.031 16.617l4.283 4.282-1.415 1.415-4.282-4.283A8.96 8.96 0 0 1 11 20c-4.968 0-9-4.032-9-9s4.032-9 9-9 9 4.032 9 9a8.96 8.96 0 0 1-1.969 5.617zm-2.006-.742A6.977 6.977 0 0 0 18 11c0-3.86-3.14-7-7-7s-7 3.14-7 7 3.14 7 7 7a6.977 6.977 0 0 0 4.875-1.975l.15-.15z" fill="currentColor"/>
      </svg>
      <h4> Search Notes</h4>
  
  <!-- Search Input Field -->
  <input type="text"id="search-input"class="search-input"placeholder="Search your notes..."onkeyup="searchNotes(this.value)">
</div>


      <!-- YOUR NOTES -->

      <h2>Your Notes</h2>
      <div id="notes-loading">Loading notes...</div>

      <div class="notes-grid"id="main-notes-container"></div>



      <!-- ARCHIEVED NOTES MESSAGE -->

      <div class="box archive-box">
        <svg xmlns="http://w3.org" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="archive-icon">
        <!-- Top lid of the box -->
        <polyline points="21 8 21 3 3 3 3 8"></polyline>
        <!-- Main body of the box -->
        <rect x="1" y="8" width="22" height="5"></rect>
        <!-- Drawer handle or slot -->
        <path d="M10 12h4"></path>
        </svg>


     <h4>Archived Notes</h4>

   <button onclick="toggleArchive()"> Show Archived Notes</button>

   <div id="archive-container" style="display:none; margin-top:20px;"></div>

  </div>

  <!-- FOOTER -->

  <footer>

    © 2026 NoteNest | Personalized Notes Web App

  </footer>
  <script src="script.js"></script>

</body>

</html>
